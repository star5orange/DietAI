# ============================================================
# Gradle 全局属性 — JVM 内存 + 网络代理
#
# 安装位置: ~/.gradle/gradle.properties
#
# 作用: 为所有 Gradle 项目自动应用 JVM 参数和代理配置，
#       即使 android/ 目录被 Flutter 重新生成也不会丢失。
# ============================================================

# --- JVM 内存配置 ---
# 大型 Flutter 项目（含 camera/riverpod/dio 等插件）编译需要较大内存
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError

# --- 网络代理配置 ---
# 默认端口 7890（Clash 默认），请根据你的代理软件修改
# 如果不使用代理，注释掉以下所有 systemProp 行
systemProp.http.proxyHost=127.0.0.1
systemProp.http.proxyPort=7890
systemProp.https.proxyHost=127.0.0.1
systemProp.https.proxyPort=7890
systemProp.socks.proxyHost=127.0.0.1
systemProp.socks.proxyPort=7890

# --- 常见代理端口参考 ---
# Clash:  7890
# V2Ray:  10809 (HTTP) / 10808 (SOCKS5)
# SSR:    1080
